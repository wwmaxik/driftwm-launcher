name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y libgtk-4-dev libgtk4-layer-shell-dev build-essential \
            pkg-config curl git
      
      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Check formatting
        run: |
          . "$HOME/.cargo/env"
          cargo fmt -- --check
      
      - name: Run clippy
        run: |
          . "$HOME/.cargo/env"
          cargo clippy -- -D warnings
      
      - name: Build
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --verbose
      
      - name: Run tests
        run: |
          . "$HOME/.cargo/env"
          cargo test --verbose
